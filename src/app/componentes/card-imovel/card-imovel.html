<article class="group flex flex-col bg-white rounded-3xl shadow-md
                hover:shadow-xl hover:-translate-y-1
                transition-all duration-300 overflow-hidden cursor-pointer">

    <!-- Imagem -->
    <div class="relative aspect-[4/3] overflow-hidden">

        @if (imovel.novo) {
        <span class="absolute top-3 left-3 z-10 bg-white/90 backdrop-blur-sm
                   text-slate-800 text-[10px] font-extrabold uppercase tracking-wider
                   px-2.5 py-1 rounded-lg">
            Novo
        </span>
        }

        @if (imovel.destaque) {
        <span class="absolute top-3 left-3 z-10 bg-indigo-600 text-white
                   text-[10px] font-extrabold uppercase tracking-wider
                   px-2.5 py-1 rounded-lg">
            Destaque
        </span>
        }

        <img [src]="imovel.imagens[0]" [alt]="imovel.titulo"
            class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" />
    </div>

    <!-- Corpo -->
    <div class="flex flex-col gap-3 p-5 flex-1">

        <div class="flex justify-between items-start gap-2">
            <div class="min-w-0">
                <h3 class="font-bold text-slate-900 truncate">{{ imovel.titulo }}</h3>
                <p class="text-slate-500 text-xs mt-0.5">{{ imovel.bairro }}, {{ imovel.cidade }}</p>
            </div>
            <span class="text-indigo-600 font-extrabold text-sm whitespace-nowrap">
                {{ precoFormatado }}
            </span>
        </div>

        <!-- Specs -->
        <div class="flex items-center gap-3 py-3 border-y border-slate-100 flex-wrap">
            <span class="text-slate-500 text-xs font-medium">
                🛏 {{ imovel.suites }} Suíte{{ imovel.suites > 1 ? 's' : '' }}
            </span>
            <span class="text-slate-500 text-xs font-medium">
                🚿 {{ imovel.banheiros }} Banh.
            </span>
            <span class="text-slate-500 text-xs font-medium">
                📐 {{ imovel.area }}m²
            </span>
        </div>

        <!-- Botão -->
        <button (click)="verDetalhes()" class="mt-auto w-full bg-slate-50 hover:bg-indigo-600
         text-slate-800 hover:text-white font-semibold text-sm
         py-3 rounded-xl transition-colors duration-200">
            Ver Detalhes
        </button>

    </div>
</article>
