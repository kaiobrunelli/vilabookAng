<header class="fixed top-0 left-0 right-0 z-50 px-4 py-3">
    <div class="max-w-7xl mx-auto flex items-center justify-between
              bg-white/80 backdrop-blur-md border border-white/60
              rounded-2xl px-6 py-3 shadow-sm">

        <!-- Logo -->
        <a routerLink="/" class="flex items-center gap-2">
            <img src="VB-SVG.svg" alt="VilaBook" class="w-8 h-8 rounded-lg" />
            <span class="text-xl font-bold text-slate-900">
                Vila<span class="text-blue-600 ">Book</span>
            </span>
        </a>

        <!-- Nav -->
        <nav class="hidden md:flex items-center gap-8">
            <a [routerLink]="['/']" [queryParams]="{filtro: 'venda'}"
                class="text-sm font-medium text-slate-600 hover:text-indigo-600 transition-colors cursor-pointer">
                Comprar
            </a>
            <a [routerLink]="['/']" [queryParams]="{filtro: 'aluguel'}"
                class="text-sm font-medium text-slate-600 hover:text-indigo-600 transition-colors cursor-pointer">
                Alugar
            </a>
            <a [routerLink]="['/']" [queryParams]="{filtro: 'todos'}"
                class="text-sm font-medium text-slate-600 hover:text-indigo-600 transition-colors cursor-pointer">
                Todos Imóveis
            </a>
        </nav>

        <!-- Botões -->
        <div class="flex items-center gap-3">

            @if (auth.estaLogado) {
            <a routerLink="/cadastrar" class="text-sm font-bold text-indigo-600 hover:text-indigo-700
            border border-indigo-200 hover:border-indigo-400
            px-4 py-2 rounded-xl transition-all">
                Anunciar
            </a>

            <div class="relative">

                <!-- Botão do avatar -->
                <button (click)="toggleMenu()" class="flex items-center gap-2 hover:bg-slate-100
             rounded-xl px-2 py-1.5 transition-all">

                    @if (auth.usuario()?.user_metadata?.avatar_url) {
                    <img [src]="auth.usuario()?.user_metadata?.avatar_url"
                        [alt]="auth.usuario()?.user_metadata?.full_name"
                        class="w-8 h-8 rounded-full object-cover ring-2 ring-indigo-100" />
                    } @else {
                    <div class="w-8 h-8 rounded-full bg-indigo-600 flex items-center
                    justify-center text-white text-xs font-bold">
                        {{ auth.usuario()?.user_metadata?.full_name?.charAt(0) }}
                    </div>
                    }

                    <span class="text-sm font-semibold text-slate-700 hidden md:block">
                        {{ auth.usuario()?.user_metadata?.full_name?.split(' ')[0] }}
                    </span>
                    <span class="text-slate-400 text-xs">▾</span>
                </button>

                <!-- Dropdown controlado por menuAberto -->
                @if (menuAberto) {

                <!-- Overlay invisível para fechar ao clicar fora -->
                <div class="fixed inset-0 z-40" (click)="fecharMenu()"></div>

                <div class="absolute right-0 top-full mt-2 w-52 bg-white rounded-2xl
                  shadow-xl border border-slate-100 py-2 z-50">

                    <div class="px-4 py-2 border-b border-slate-100 mb-1">
                        <p class="text-xs text-slate-400 font-medium">Conectado como</p>
                        <p class="text-sm font-semibold text-slate-700 truncate">
                            {{ auth.usuario()?.email }}
                        </p>
                    </div>

                    <a routerLink="/meus-imoveis" (click)="fecharMenu()" class="flex items-center gap-2 px-4 py-2.5 text-sm text-slate-600
                  hover:bg-slate-50 hover:text-indigo-600 transition-colors">
                        🏠 Meus imóveis
                    </a>

                    <a routerLink="/cadastrar" (click)="fecharMenu()" class="flex items-center gap-2 px-4 py-2.5 text-sm text-slate-600
                  hover:bg-slate-50 hover:text-indigo-600 transition-colors">
                        ➕ Novo anúncio
                    </a>

                    <div class="border-t border-slate-100 mt-1 pt-1">
                        <button (click)="onLogout()" class="w-full flex items-center gap-2 px-4 py-2.5 text-sm
                   text-red-500 hover:bg-red-50 transition-colors">
                            → Sair
                        </button>
                    </div>

                </div>
                }

            </div>

            } @else {
            <button (click)="onAnunciarClick()" class="text-sm font-bold text-indigo-600 hover:text-indigo-700
           border border-indigo-200 hover:border-indigo-400
           px-4 py-2 rounded-xl transition-all">
                Anunciar
            </button>
            <button (click)="onAnunciarClick()" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-bold
           px-5 py-2.5 rounded-xl shadow-lg shadow-indigo-500/30 transition-all">
                Entrar
            </button>
            }

        </div>
    </div>
</header>
